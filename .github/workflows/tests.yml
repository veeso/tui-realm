name: Tests

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Just command runner
        uses: extractions/setup-just@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rustfmt
      - run: just fmt_nightly "--check"

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Just command runner
        uses: extractions/setup-just@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy all features
        run: just clippy "-- -Dwarnings"
      - name: Clippy default features
        run: just clippy_default "-- -Dwarnings"

  build-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Just command runner
        uses: extractions/setup-just@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Examples
        run: just build_examples

  test-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.88"]
    steps:
      - uses: actions/checkout@v6
      - name: Install Just command runner
        uses: extractions/setup-just@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Cargo Build
        run: just build_all
      - name: Test
        # Tests crossterm, termion and termwiz
        run: just coverage
      - name: Coveralls
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
          flag-name: ${{ github.job }}-${{ join(matrix.*, '-') }}
          parallel: true

  test-win:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.88"]
    steps:
      - uses: actions/checkout@v6
      - name: Install Just command runner
        uses: extractions/setup-just@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Test
        # Tests crossterm and termwiz; termion is unix-only
        run: just coverage_no_termion
      - name: Coveralls
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
          flag-name: ${{ github.job }}-${{ join(matrix.*, '-') }}
          parallel: true

  test-mac:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.88"]
    steps:
      - uses: actions/checkout@v6
      - name: Install Just command runner
        uses: extractions/setup-just@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Test
        # Tests crossterm, termion and termwiz
        run: just coverage
      - name: Coveralls
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
          flag-name: ${{ github.job }}-${{ join(matrix.*, '-') }}
          parallel: true

  finish-coveralls:
    runs-on: ubuntu-latest
    needs: [test-linux, test-win, test-mac]
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
